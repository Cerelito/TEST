<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intranet - Sistema de Gestión de Calidad Ekuora</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #f2f2f7;
            position: relative;
            overflow: hidden;
        }

        /* Animated mesh gradient background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(168, 216, 255, 0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(200, 170, 255, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(170, 230, 220, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(255, 200, 220, 0.3) 0%, transparent 50%);
            background-color: #f5f5fa;
            animation: meshMove 20s ease-in-out infinite alternate;
        }

        @keyframes meshMove {
            0% {
                background:
                    radial-gradient(ellipse at 20% 50%, rgba(168, 216, 255, 0.5) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 20%, rgba(200, 170, 255, 0.4) 0%, transparent 50%),
                    radial-gradient(ellipse at 50% 80%, rgba(170, 230, 220, 0.4) 0%, transparent 50%),
                    radial-gradient(ellipse at 70% 60%, rgba(255, 200, 220, 0.3) 0%, transparent 50%);
                background-color: #f5f5fa;
            }
            33% {
                background:
                    radial-gradient(ellipse at 40% 30%, rgba(168, 216, 255, 0.5) 0%, transparent 50%),
                    radial-gradient(ellipse at 60% 70%, rgba(200, 170, 255, 0.4) 0%, transparent 50%),
                    radial-gradient(ellipse at 30% 60%, rgba(170, 230, 220, 0.4) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 40%, rgba(255, 200, 220, 0.3) 0%, transparent 50%);
                background-color: #f5f5fa;
            }
            66% {
                background:
                    radial-gradient(ellipse at 60% 70%, rgba(168, 216, 255, 0.5) 0%, transparent 50%),
                    radial-gradient(ellipse at 30% 40%, rgba(200, 170, 255, 0.4) 0%, transparent 50%),
                    radial-gradient(ellipse at 70% 30%, rgba(170, 230, 220, 0.4) 0%, transparent 50%),
                    radial-gradient(ellipse at 40% 80%, rgba(255, 200, 220, 0.3) 0%, transparent 50%);
                background-color: #f5f5fa;
            }
            100% {
                background:
                    radial-gradient(ellipse at 50% 40%, rgba(168, 216, 255, 0.5) 0%, transparent 50%),
                    radial-gradient(ellipse at 20% 60%, rgba(200, 170, 255, 0.4) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 50%, rgba(170, 230, 220, 0.4) 0%, transparent 50%),
                    radial-gradient(ellipse at 50% 20%, rgba(255, 200, 220, 0.3) 0%, transparent 50%);
                background-color: #f5f5fa;
            }
        }

        /* Floating liquid blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #a8d8ff, #c4b5fd);
            top: -150px;
            left: -100px;
            animation: blobFloat1 25s ease-in-out infinite;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #c4b5fd, #fda4af);
            bottom: -100px;
            right: -100px;
            animation: blobFloat2 20s ease-in-out infinite;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #99f6e4, #a8d8ff);
            top: 40%;
            left: 60%;
            animation: blobFloat3 22s ease-in-out infinite;
        }

        @keyframes blobFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(80px, 60px) scale(1.1) rotate(45deg); }
            50% { transform: translate(40px, 120px) scale(0.95) rotate(90deg); }
            75% { transform: translate(-30px, 60px) scale(1.05) rotate(135deg); }
        }

        @keyframes blobFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(-60px, -40px) scale(1.08) rotate(-30deg); }
            50% { transform: translate(-100px, -80px) scale(0.92) rotate(-60deg); }
            75% { transform: translate(-40px, -20px) scale(1.04) rotate(-90deg); }
        }

        @keyframes blobFloat3 {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(-50px, 50px) scale(1.12) rotate(60deg); }
            50% { transform: translate(30px, -40px) scale(0.9) rotate(120deg); }
            75% { transform: translate(60px, 20px) scale(1.06) rotate(180deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }

        /* Logo */
        .logo-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 28px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;

            background: linear-gradient(135deg,
                rgba(255,255,255,0.85) 0%,
                rgba(255,255,255,0.45) 100%
            );
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.06),
                0 1px 3px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);

            animation: logoEntrance 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: linear-gradient(135deg,
                rgba(168, 216, 255, 0.15),
                rgba(196, 181, 253, 0.15),
                rgba(153, 246, 228, 0.1)
            );
            animation: logoShimmer 6s ease-in-out infinite alternate;
        }

        @keyframes logoShimmer {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @keyframes logoEntrance {
            0% { opacity: 0; transform: scale(0.5) translateY(-20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo-icon img {
            width: 54px;
            height: 54px;
            object-fit: contain;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(60, 60, 80, 0.5);
            margin-bottom: 10px;
            animation: textReveal 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s both;
        }

        .subtitle {
            font-size: 46px;
            font-weight: 700;
            color: #1d1d2f;
            margin-bottom: 6px;
            line-height: 1.15;
            letter-spacing: -0.5px;
            animation: textReveal 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.5s both;
        }

        .description {
            font-size: 20px;
            color: rgba(60, 60, 80, 0.55);
            font-weight: 400;
            margin-bottom: 56px;
            letter-spacing: 1px;
            animation: textReveal 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.7s both;
        }

        @keyframes textReveal {
            0% { opacity: 0; transform: translateY(24px); filter: blur(4px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* Buttons */
        .buttons {
            display: flex;
            gap: 28px;
            justify-content: center;
            flex-wrap: wrap;
            animation: textReveal 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.9s both;
        }

        /* Liquid crystal glass button */
        .glass-btn {
            position: relative;
            width: 270px;
            height: 200px;
            border-radius: 32px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            cursor: pointer;
            overflow: hidden;

            background: linear-gradient(135deg,
                rgba(255, 255, 255, 0.75) 0%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0.6) 100%
            );
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow:
                0 4px 30px rgba(0, 0, 0, 0.04),
                0 1px 2px rgba(0, 0, 0, 0.02),
                inset 0 1px 0 rgba(255, 255, 255, 0.95),
                inset 0 -1px 0 rgba(255, 255, 255, 0.3);

            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Liquid crystal rainbow refraction */
        .glass-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 32px;
            background: linear-gradient(
                var(--gradient-angle, 135deg),
                rgba(168, 216, 255, 0.0) 0%,
                rgba(168, 216, 255, 0.12) 20%,
                rgba(196, 181, 253, 0.12) 40%,
                rgba(253, 164, 175, 0.08) 60%,
                rgba(153, 246, 228, 0.1) 80%,
                rgba(168, 216, 255, 0.0) 100%
            );
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        .glass-btn:hover::before {
            opacity: 1;
        }

        /* Specular highlight - liquid crystal top shine */
        .glass-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 50%;
            border-radius: 0 0 50% 50%;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.6) 0%,
                rgba(255, 255, 255, 0.0) 100%
            );
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .glass-btn:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.95);
            box-shadow:
                0 24px 60px rgba(0, 0, 0, 0.08),
                0 8px 20px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 1),
                inset 0 -1px 0 rgba(255, 255, 255, 0.4);
        }

        .glass-btn:active {
            transform: translateY(-4px) scale(0.98);
            transition-duration: 0.2s;
        }

        /* Button accent colors on hover */
        .btn-vista:hover {
            box-shadow:
                0 24px 60px rgba(100, 180, 255, 0.12),
                0 8px 20px rgba(100, 180, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 1),
                inset 0 -1px 0 rgba(255, 255, 255, 0.4);
        }

        .btn-admin:hover {
            box-shadow:
                0 24px 60px rgba(160, 120, 255, 0.12),
                0 8px 20px rgba(160, 120, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 1),
                inset 0 -1px 0 rgba(255, 255, 255, 0.4);
        }

        /* Button icon */
        .btn-icon {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-vista .btn-icon {
            background: linear-gradient(135deg, rgba(100, 180, 255, 0.15), rgba(100, 180, 255, 0.05));
            border: 1px solid rgba(100, 180, 255, 0.25);
            box-shadow: 0 4px 16px rgba(100, 180, 255, 0.08);
        }

        .btn-admin .btn-icon {
            background: linear-gradient(135deg, rgba(160, 120, 255, 0.15), rgba(160, 120, 255, 0.05));
            border: 1px solid rgba(160, 120, 255, 0.25);
            box-shadow: 0 4px 16px rgba(160, 120, 255, 0.08);
        }

        .glass-btn:hover .btn-icon {
            transform: scale(1.12) translateY(-2px);
        }

        .btn-icon svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-vista .btn-icon svg { stroke: #4a9eff; }
        .btn-admin .btn-icon svg { stroke: #8b5cf6; }

        /* Button text */
        .btn-label {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d2f;
            letter-spacing: 0.3px;
            position: relative;
            z-index: 1;
        }

        .btn-sublabel {
            font-size: 12px;
            font-weight: 400;
            color: rgba(60, 60, 80, 0.45);
            letter-spacing: 0.5px;
            margin-top: -8px;
            position: relative;
            z-index: 1;
        }

        /* Ripple */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.7), rgba(255,255,255,0.0));
            transform: scale(0);
            animation: rippleAnim 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes rippleAnim {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(60, 60, 80, 0.3);
            font-weight: 400;
            letter-spacing: 1.5px;
            animation: textReveal 0.8s ease 1.3s both;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .subtitle { font-size: 30px; }
            .buttons { flex-direction: column; align-items: center; gap: 20px; }
            .glass-btn { width: 260px; height: 180px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <div class="logo-icon">
            <img src="logo.png" alt="Ekuora Logo">
        </div>

        <p class="title">Intranet</p>
        <h1 class="subtitle">Sistema de Gestión de Calidad</h1>
        <p class="description">Ekuora</p>

        <div class="buttons">
            <a href="https://portamx-my.sharepoint.com/:f:/g/personal/files_porta_com_mx/IgBsJNv_RK49QKtmbc1Oru7eAbpamBTrNIHVKWFE02gd_Ns" target="_blank" class="glass-btn btn-vista" id="btnVista">
                <div class="btn-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </div>
                <span class="btn-label">Vista</span>
                <span class="btn-sublabel">Acceso de consulta</span>
            </a>

            <a href="https://portamx-my.sharepoint.com/:f:/g/personal/files_porta_com_mx/IgBsJNv_RK49QKtmbc1Oru7eAav8-p0fzXQtsWOle04SKxc" target="_blank" class="glass-btn btn-admin" id="btnAdmin">
                <div class="btn-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
                <span class="btn-label">Admin</span>
                <span class="btn-sublabel">Panel de administración</span>
            </a>
        </div>
    </div>

    <div class="footer">Ekuora &copy; 2026</div>

    <script>
        // Liquid crystal gradient angle tracking
        document.querySelectorAll('.glass-btn').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                const angle = Math.atan2(y - 0.5, x - 0.5) * (180 / Math.PI) + 180;
                btn.style.setProperty('--gradient-angle', angle + 'deg');
            });

            // Smooth ripple on click
            btn.addEventListener('click', (e) => {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                const rect = btn.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = e.clientX - rect.left - size / 2 + 'px';
                ripple.style.top = e.clientY - rect.top - size / 2 + 'px';
                btn.appendChild(ripple);
                setTimeout(() => ripple.remove(), 700);
            });
        });

        // Subtle parallax on blobs
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;

            document.querySelectorAll('.blob').forEach((blob, i) => {
                const speed = (i + 1) * 12;
                blob.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body>
</html>
