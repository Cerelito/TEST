<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Gestión de Calidad — Ekuora</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef0f8;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #eef0f8;
    }

    /* big soft color blobs that bleed through glass */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }
    .b1 { width:600px; height:600px; top:-180px; left:-120px;
          background: radial-gradient(circle, #c7d9ff, #dac8ff);
          animation: bm1 22s ease-in-out infinite alternate; }
    .b2 { width:500px; height:500px; bottom:-140px; right:-100px;
          background: radial-gradient(circle, #ffd6e8, #ffc8a0);
          animation: bm2 18s ease-in-out infinite alternate; }
    .b3 { width:420px; height:420px; top:50%; left:55%;
          background: radial-gradient(circle, #b8f0e0, #c4e8ff);
          animation: bm3 25s ease-in-out infinite alternate; }

    @keyframes bm1 { 0%{transform:translate(0,0)scale(1)} 100%{transform:translate(60px,80px)scale(1.15)} }
    @keyframes bm2 { 0%{transform:translate(0,0)scale(1)} 100%{transform:translate(-70px,-60px)scale(1.12)} }
    @keyframes bm3 { 0%{transform:translate(-50%,-50%)scale(1)} 100%{transform:translate(calc(-50% + 50px),calc(-50% - 40px))scale(1.1)} }

    /* ── STAGE ── */
    .stage {
      position: relative; z-index: 2;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px;
      gap: 0;
    }

    /* ── LOGO ── */
    .logo-wrap {
      margin-bottom: 32px;
      animation: popIn 1s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .logo-box {
      width: 100px; height: 100px;
      border-radius: 28px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;

      background: rgba(255,255,255,0.58);
      backdrop-filter: blur(40px) saturate(200%) brightness(1.05);
      -webkit-backdrop-filter: blur(40px) saturate(200%) brightness(1.05);
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow:
        0 2px 0 rgba(255,255,255,1) inset,
        0 -1px 0 rgba(180,180,220,0.15) inset,
        0 20px 60px rgba(120,120,200,0.12),
        0 4px 16px rgba(0,0,0,0.06);
    }

    /* specular top shine */
    .logo-box::before {
      content:'';
      position:absolute; top:0; left:6%; right:6%; height:50%;
      background: linear-gradient(180deg,rgba(255,255,255,0.7) 0%,rgba(255,255,255,0) 100%);
      border-radius: 0 0 50% 50%;
      pointer-events: none;
    }

    .logo-box img {
      width: 62px; height: 62px;
      object-fit: contain;
      position: relative; z-index: 1;
    }

    /* ── HEADINGS ── */
    .eyebrow {
      font-size: 11px; font-weight: 600;
      letter-spacing: 4px; text-transform: uppercase;
      color: rgba(60,60,100,0.38);
      margin-bottom: 10px;
      animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.15s both;
    }

    .headline {
      font-size: clamp(30px,3.8vw,54px);
      font-weight: 800; letter-spacing: -1.5px; line-height: 1.06;
      text-align: center;
      color: #16163a;
      margin-bottom: 8px;
      animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.28s both;
    }

    .brand {
      font-size: 15px; font-weight: 500;
      color: rgba(60,60,100,0.35);
      letter-spacing: 3px;
      margin-bottom: 60px;
      animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.4s both;
    }

    /* ── CARDS ── */
    .cards {
      display: flex; gap: 22px; flex-wrap: wrap; justify-content: center;
      animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.54s both;
    }

    .card {
      position: relative;
      width: 240px; height: 220px;
      border-radius: 32px;
      text-decoration: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 15px;
      overflow: hidden;
      cursor: pointer;

      /* LIQUID GLASS */
      background: rgba(255,255,255,0.48);
      backdrop-filter: blur(50px) saturate(180%) brightness(1.04);
      -webkit-backdrop-filter: blur(50px) saturate(180%) brightness(1.04);

      /* layered borders for glass depth */
      border: 1px solid rgba(255,255,255,0.85);
      box-shadow:
        0 2px 0 rgba(255,255,255,0.95) inset,
        0 -1px 0 rgba(160,160,220,0.12) inset,
        0 20px 60px rgba(100,100,180,0.10),
        0 4px 16px rgba(0,0,0,0.05);

      transition:
        transform     0.6s cubic-bezier(0.23,1,0.32,1),
        box-shadow    0.6s cubic-bezier(0.23,1,0.32,1),
        background    0.4s ease,
        border-color  0.4s ease;
    }

    /* specular dome highlight */
    .card::before {
      content:'';
      position:absolute; top:0; left:7%; right:7%; height:46%;
      background: linear-gradient(180deg,rgba(255,255,255,0.75) 0%,rgba(255,255,255,0) 100%);
      border-radius: 0 0 55% 55%;
      pointer-events:none;
      transition: opacity 0.4s ease;
    }

    /* iridescent colour that follows mouse */
    .card::after {
      content:'';
      position:absolute; inset:0; border-radius:32px;
      background: conic-gradient(
        from var(--angle,200deg) at 50% 50%,
        rgba(170,200,255,0.0)   0deg,
        rgba(170,200,255,0.18) 60deg,
        rgba(220,170,255,0.14) 120deg,
        rgba(170,240,220,0.12) 180deg,
        rgba(255,200,200,0.10) 240deg,
        rgba(170,200,255,0.0)  300deg
      );
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events:none;
    }

    .card:hover {
      transform: translateY(-12px) scale(1.03);
      background: rgba(255,255,255,0.62);
      border-color: rgba(255,255,255,1);
      box-shadow:
        0 2px 0 rgba(255,255,255,1) inset,
        0 -1px 0 rgba(160,160,220,0.15) inset,
        0 36px 80px rgba(100,100,180,0.16),
        0 12px 32px rgba(0,0,0,0.07),
        var(--glow, none);
    }
    .card:hover::after { opacity: 1; }
    .card:hover::before { opacity: 0.6; }

    .card:active {
      transform: translateY(-4px) scale(0.97);
      transition-duration: 0.18s;
    }

    .card-vista { --glow: 0 0 50px rgba(80,180,255,0.14); }
    .card-admin { --glow: 0 0 50px rgba(160,100,255,0.14); }

    /* ── ICON ── */
    .icon-pill {
      width: 58px; height: 58px; border-radius: 17px;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
      transition: transform 0.6s cubic-bezier(0.23,1,0.32,1);

      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset;
    }

    .card-vista .icon-pill {
      background: linear-gradient(150deg,rgba(100,190,255,0.22),rgba(100,190,255,0.07));
      box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 4px 18px rgba(80,160,255,0.14);
    }
    .card-admin .icon-pill {
      background: linear-gradient(150deg,rgba(170,110,255,0.22),rgba(170,110,255,0.07));
      box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 4px 18px rgba(150,90,255,0.14);
    }

    .card:hover .icon-pill { transform: scale(1.14) translateY(-3px); }

    .icon-pill svg {
      width: 25px; height: 25px; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }
    .card-vista .icon-pill svg { stroke: #3b9eff; }
    .card-admin .icon-pill svg { stroke: #9f6fff; }

    /* ── TEXT ── */
    .card-title {
      font-size: 17px; font-weight: 700;
      color: #18183a; letter-spacing: -0.2px;
      position: relative; z-index: 1;
    }
    .card-sub {
      font-size: 12px; font-weight: 400;
      color: rgba(60,60,100,0.42);
      margin-top: -9px;
      position: relative; z-index: 1;
    }

    /* ── RIPPLE ── */
    .ripple {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 20;
      background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 70%);
      transform: scale(0);
      animation: rip 0.7s cubic-bezier(0.23,1,0.32,1) forwards;
    }
    @keyframes rip { to { transform:scale(5); opacity:0; } }

    /* ── FOOTER ── */
    footer {
      position: fixed; bottom: 26px; left: 0; right: 0; text-align: center;
      font-size: 11px; font-weight: 500;
      color: rgba(60,60,100,0.28); letter-spacing: 1.5px;
      z-index: 2;
      animation: slideUp 0.8s ease 1.1s both;
    }

    /* ── ANIMATIONS ── */
    @keyframes popIn {
      0%   { opacity:0; transform:scale(0.55) translateY(-12px); }
      100% { opacity:1; transform:scale(1) translateY(0); }
    }
    @keyframes slideUp {
      0%   { opacity:0; transform:translateY(22px); filter:blur(5px); }
      100% { opacity:1; transform:translateY(0);    filter:blur(0); }
    }

    @media(max-width:560px){
      .headline { font-size:26px; letter-spacing:-0.5px; }
      .cards { flex-direction:column; align-items:center; }
      .card  { width:270px; height:200px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <main class="stage">

    <div class="logo-wrap">
      <div class="logo-box">
        <img src="logo.png" alt="Ekuora" />
      </div>
    </div>

    <p class="eyebrow">Intranet · Ekuora</p>
    <h1 class="headline">Sistema de Gestión<br>de Calidad</h1>
    <p class="brand">EKUORA</p>

    <div class="cards">

      <a href="https://portamx-my.sharepoint.com/:f:/g/personal/files_porta_com_mx/IgBsJNv_RK49QKtmbc1Oru7eAbpamBTrNIHVKWFE02gd_Ns"
         target="_blank" rel="noopener" class="card card-vista">
        <div class="icon-pill">
          <svg viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <span class="card-title">Vista</span>
        <span class="card-sub">Acceso de consulta</span>
      </a>

      <a href="https://portamx-my.sharepoint.com/:f:/g/personal/files_porta_com_mx/IgBsJNv_RK49QKtmbc1Oru7eAav8-p0fzXQtsWOle04SKxc"
         target="_blank" rel="noopener" class="card card-admin">
        <div class="icon-pill">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <span class="card-title">Admin</span>
        <span class="card-sub">Panel de administración</span>
      </a>

    </div>
  </main>

  <footer>Ekuora &copy; <span id="yr"></span></footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    // iridescent conic gradient follows mouse angle
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - 0.5;
        const y = (e.clientY - r.top)  / r.height - 0.5;
        const deg = Math.atan2(y, x) * (180 / Math.PI) + 180;
        card.style.setProperty('--angle', deg + 'deg');
      });

      card.addEventListener('click', e => {
        const s = document.createElement('span');
        s.className = 'ripple';
        const r = card.getBoundingClientRect();
        const sz = Math.max(r.width, r.height);
        s.style.cssText =
          `width:${sz}px;height:${sz}px;` +
          `left:${e.clientX - r.left - sz/2}px;` +
          `top:${e.clientY - r.top  - sz/2}px`;
        card.appendChild(s);
        s.addEventListener('animationend', () => s.remove());
      });
    });

    // parallax blobs on mouse
    document.addEventListener('mousemove', e => {
      const mx = (e.clientX / innerWidth  - 0.5) * 30;
      const my = (e.clientY / innerHeight - 0.5) * 30;
      document.querySelectorAll('.blob').forEach((b, i) => {
        const f = (i + 1) * 0.5;
        b.style.transform =
          `translate(${mx * f}px, ${my * f}px)`;
      });
    });
  </script>
</body>
</html>
